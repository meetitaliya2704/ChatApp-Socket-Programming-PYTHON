<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureChat — Encrypted Messaging</title>
    <meta name="description" content="SecureChat — End-to-end encrypted real-time messaging application">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        /* ─── RESET & TOKENS ─── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary:   #0a0e17;
            --bg-secondary: #111827;
            --bg-card:      #1a2035;
            --bg-card-alt:  #1e2642;
            --accent:       #00d4aa;
            --accent-dark:  #00a88a;
            --accent-glow:  rgba(0, 212, 170, 0.15);
            --accent-glow2: rgba(0, 212, 170, 0.08);
            --text-primary: #e6edf3;
            --text-muted:   #6b7b8d;
            --text-dim:     #3d4f63;
            --border:       #1e2a3a;
            --border-light: #283548;
            --msg-self:     #0d2f3f;
            --msg-other:    #151d2e;
            --msg-server:   #2a1f0a;
            --msg-private:  #1a1a3a;
            --msg-error:    #3a1a1a;
            --error:        #f85149;
            --success:      #3fb950;
            --warning:      #e3b341;
            --info:         #79c0ff;
            --font-body:    'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono:    'JetBrains Mono', 'Consolas', monospace;
            --radius-sm:    8px;
            --radius-md:    12px;
            --radius-lg:    20px;
            --shadow-glow:  0 0 40px rgba(0, 212, 170, 0.06);
            --shadow-card:  0 8px 32px rgba(0, 0, 0, 0.35);
            --transition:   all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── BACKGROUND ─── */
        .bg-grid {
            position: fixed; inset: 0;
            background-image:
                radial-gradient(ellipse 800px 600px at 20% 30%, rgba(0, 212, 170, 0.04), transparent),
                radial-gradient(ellipse 600px 500px at 80% 70%, rgba(79, 192, 255, 0.03), transparent);
            z-index: 0;
            pointer-events: none;
        }

        /* ─── AUTH SCREEN ─── */
        #auth-screen {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .auth-card {
            width: 420px;
            background: linear-gradient(145deg, rgba(26, 32, 53, 0.9), rgba(17, 24, 39, 0.95));
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 44px 40px;
            box-shadow: var(--shadow-card), var(--shadow-glow);
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.7;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 8px;
        }

        .auth-logo .icon {
            font-size: 40px;
            display: block;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 20px rgba(0, 212, 170, 0.3));
        }

        .auth-logo h1 {
            font-family: var(--font-mono);
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--info));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
        }

        .auth-logo p {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 6px;
        }

        .form-group {
            position: relative;
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-primary);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 14px;
            transition: var(--transition);
            outline: none;
        }

        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-input::placeholder { color: var(--text-dim); }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn:hover::after { opacity: 1; }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: var(--bg-primary);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0, 212, 170, 0.3);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1.5px solid var(--border);
        }
        .btn-secondary:hover {
            border-color: var(--accent);
            background: var(--bg-card-alt);
        }

        .auth-status {
            text-align: center;
            font-size: 13px;
            min-height: 20px;
            margin-top: 16px;
            transition: var(--transition);
        }
        .auth-status.error   { color: var(--error); }
        .auth-status.success { color: var(--success); }
        .auth-status.loading { color: var(--text-muted); }

        /* ─── CHAT SCREEN ─── */
        #chat-screen {
            position: relative;
            z-index: 1;
            display: none;
            height: 100vh;
            animation: fadeIn 0.5s ease;
        }

        .chat-layout {
            display: flex;
            height: 100%;
        }

        /* ─── SIDEBAR ─── */
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, var(--bg-card), var(--bg-secondary));
        }

        .sidebar-header .logo {
            font-family: var(--font-mono);
            font-size: 17px;
            font-weight: 700;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-header .user-tag {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sidebar-header .user-tag .dot {
            width: 8px; height: 8px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 6px rgba(63, 185, 80, 0.5);
        }

        .sidebar-section-title {
            padding: 16px 20px 8px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px;
        }

        .users-list::-webkit-scrollbar { width: 4px; }
        .users-list::-webkit-scrollbar-track { background: transparent; }
        .users-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            font-size: 13px;
            color: var(--text-primary);
        }

        .user-item:hover {
            background: var(--bg-card);
        }

        .user-item .user-dot {
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .user-item.is-you {
            color: var(--accent);
            font-weight: 600;
        }

        .sidebar-actions {
            padding: 12px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .sidebar-btn {
            width: 100%;
            padding: 9px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-btn:hover {
            background: var(--bg-card-alt);
            border-color: var(--border-light);
        }

        .sidebar-btn.danger { color: var(--error); }
        .sidebar-btn.danger:hover { border-color: var(--error); background: var(--msg-error); }

        /* ─── MAIN CHAT AREA ─── */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .topbar {
            height: 56px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            flex-shrink: 0;
        }

        .topbar .channel-name {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .topbar .channel-name .hash {
            color: var(--text-muted);
            font-weight: 400;
        }

        .topbar .hints {
            font-size: 11px;
            color: var(--text-dim);
        }

        .topbar .hints kbd {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 10px;
            margin: 0 2px;
        }

        /* ─── MESSAGES ─── */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scroll-behavior: smooth;
        }

        .messages-container::-webkit-scrollbar { width: 6px; }
        .messages-container::-webkit-scrollbar-track { background: transparent; }
        .messages-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .msg-bubble {
            max-width: 85%;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            font-size: 13.5px;
            line-height: 1.6;
            animation: msgIn 0.25s ease;
            position: relative;
            word-wrap: break-word;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-bubble.self {
            background: linear-gradient(135deg, var(--msg-self), #0a2a3a);
            border: 1px solid rgba(0, 212, 170, 0.15);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-bubble.other {
            background: var(--msg-other);
            border: 1px solid var(--border);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg-bubble.server {
            background: linear-gradient(135deg, var(--msg-server), #1f1a0a);
            border: 1px solid rgba(227, 179, 65, 0.15);
            align-self: center;
            text-align: center;
            font-size: 12.5px;
            color: var(--warning);
            max-width: 70%;
        }

        .msg-bubble.private {
            background: linear-gradient(135deg, var(--msg-private), #15153a);
            border: 1px solid rgba(121, 192, 255, 0.15);
            align-self: flex-start;
        }

        .msg-bubble.error {
            background: var(--msg-error);
            border: 1px solid rgba(248, 81, 73, 0.15);
            align-self: center;
            color: var(--error);
            font-size: 12.5px;
        }

        .msg-bubble.system {
            background: transparent;
            border: none;
            align-self: center;
            color: var(--text-dim);
            font-size: 12px;
            padding: 4px 12px;
        }

        .msg-bubble.history-divider {
            background: transparent;
            border: none;
            align-self: center;
            color: var(--text-dim);
            font-size: 11px;
            padding: 8px 16px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .msg-sender {
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 2px;
            color: var(--accent);
        }

        .msg-time {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 4px;
            text-align: right;
        }

        /* ─── INPUT BAR ─── */
        .input-bar {
            padding: 14px 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .input-bar input {
            flex: 1;
            padding: 12px 18px;
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 13.5px;
            outline: none;
            transition: var(--transition);
        }

        .input-bar input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-bar input::placeholder { color: var(--text-dim); }

        .send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border: none;
            border-radius: var(--radius-sm);
            color: var(--bg-primary);
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .send-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0, 212, 170, 0.25);
        }

        .send-btn:active { transform: translateY(0); }

        /* ─── TYPING INDICATOR ─── */
        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 24px 0;
            font-size: 11px;
            color: var(--text-dim);
            height: 0;
            overflow: hidden;
            transition: height 0.3s ease;
        }

        .connection-status.visible {
            height: 24px;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 768px) {
            .sidebar { width: 0; overflow: hidden; border: none; }
            .sidebar.open { width: 260px; position: absolute; z-index: 10; height: 100%; }
            .topbar .hints { display: none; }
        }

        /* ─── SCROLLBAR ─── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* ─── WELCOME MSG ─── */
        .welcome-section {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
        }

        .welcome-section .welcome-icon {
            font-size: 48px;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 30px rgba(0, 212, 170, 0.2));
        }

        .welcome-section h2 {
            font-size: 18px;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 8px;
        }

        .welcome-section p {
            font-size: 13px;
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ─── PULSE ANIM ─── */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .loading-pulse { animation: pulse 1.5s ease-in-out infinite; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <!-- ─── AUTH SCREEN ─── -->
    <div id="auth-screen">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="icon">🔐</span>
                <h1>SecureChat</h1>
                <p>End-to-end encrypted messaging</p>
            </div>

            <div style="margin-top: 28px;">
                <div class="form-group">
                    <label for="auth-username">Username</label>
                    <input type="text" id="auth-username" class="form-input"
                           placeholder="Enter your username" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="auth-password">Password</label>
                    <input type="password" id="auth-password" class="form-input"
                           placeholder="Enter your password">
                </div>

                <div class="btn-group">
                    <button id="btn-login" class="btn btn-primary" onclick="doAuth('login')">Login</button>
                    <button id="btn-register" class="btn btn-secondary" onclick="doAuth('register')">Register</button>
                </div>

                <div id="auth-status" class="auth-status"></div>
            </div>
        </div>
    </div>

    <!-- ─── CHAT SCREEN ─── -->
    <div id="chat-screen">
        <div class="chat-layout">
            <!-- Sidebar -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="logo">🔐 SecureChat</div>
                    <div class="user-tag">
                        <span class="dot"></span>
                        <span id="display-username">@user</span>
                    </div>
                </div>

                <div class="sidebar-section-title">Online Users</div>
                <div class="users-list" id="users-list">
                    <!-- Users populated by JS -->
                </div>

                <div class="sidebar-actions">
                    <button class="sidebar-btn" onclick="requestUsers()">
                        <span>↻</span> Refresh Users
                    </button>
                    <button class="sidebar-btn danger" onclick="leaveChat()">
                        <span>⏻</span> Leave Chat
                    </button>
                </div>
            </div>

            <!-- Main Chat Area -->
            <div class="main-area">
                <div class="topbar">
                    <div class="channel-name">
                        <span class="hash">#</span> general
                    </div>
                    <div class="hints">
                        <kbd>!DM</kbd> user msg &nbsp;·&nbsp; <kbd>!USERS</kbd>
                    </div>
                </div>

                <div class="messages-container" id="messages-container">
                    <div class="welcome-section">
                        <div class="welcome-icon">💬</div>
                        <h2>Welcome to the chat!</h2>
                        <p>Messages from the server and other users will appear here. Type a message below to get started.</p>
                    </div>
                </div>

                <div class="input-bar">
                    <input type="text" id="msg-input"
                           placeholder="Type a message..."
                           autocomplete="off"
                           onkeydown="if(event.key==='Enter')sendMessage()">
                    <button class="send-btn" onclick="sendMessage()">
                        Send <span>↑</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ─── STATE ───
        let socket = null;
        let currentUser = '';

        // ─── SOCKET.IO SETUP ───
        function initSocket() {
            socket = io();

            socket.on('connect', () => {
                console.log('[WEB] Connected to bridge server');
            });

            socket.on('auth_response', (data) => {
                const statusEl = document.getElementById('auth-status');
                if (data.success) {
                    statusEl.className = 'auth-status success';
                    statusEl.textContent = '✓ ' + data.message;
                    currentUser = data.username;
                    setTimeout(() => showChat(), 500);
                } else {
                    statusEl.className = 'auth-status error';
                    statusEl.textContent = data.message;
                    enableAuthButtons();
                }
            });

            socket.on('server_message', (data) => {
                handleServerMessage(data);
            });

            socket.on('left', () => {
                window.location.reload();
            });

            socket.on('disconnect', () => {
                appendMessage('🔴 Disconnected from server.', 'system');
            });
        }

        // ─── AUTH ───
        function doAuth(mode) {
            const username = document.getElementById('auth-username').value.trim();
            const password = document.getElementById('auth-password').value.trim();
            const statusEl = document.getElementById('auth-status');

            if (!username || !password) {
                statusEl.className = 'auth-status error';
                statusEl.textContent = 'Please fill in both fields.';
                return;
            }

            statusEl.className = 'auth-status loading loading-pulse';
            statusEl.textContent = 'Connecting to server...';
            disableAuthButtons();

            if (!socket) initSocket();

            // Small delay to ensure socket connection
            setTimeout(() => {
                socket.emit('auth', { mode, username, password });
            }, 300);
        }

        function disableAuthButtons() {
            document.getElementById('btn-login').disabled = true;
            document.getElementById('btn-register').disabled = true;
        }

        function enableAuthButtons() {
            document.getElementById('btn-login').disabled = false;
            document.getElementById('btn-register').disabled = false;
        }

        // ─── SHOW CHAT ───
        function showChat() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'block';
            document.getElementById('display-username').textContent = '@' + currentUser;
            document.getElementById('msg-input').focus();

            // Auto-request users after joining
            setTimeout(() => requestUsers(), 1000);
        }

        // ─── HANDLE SERVER MESSAGES ───
        function handleServerMessage(data) {
            const msg = data.message;
            const type = data.type;

            // Parse online users
            if (type === 'users' || msg.includes('[ONLINE USERS]')) {
                parseUsers(msg);
            }

            // Determine display type
            let displayType = type;
            if (msg.includes('CHAT HISTORY') || msg.includes('LIVE CHAT')) {
                displayType = 'history-divider';
            }

            appendMessage(msg, displayType);
        }

        // ─── SEND MESSAGE ───
        function sendMessage() {
            const input = document.getElementById('msg-input');
            const msg = input.value.trim();
            if (!msg || !socket) return;
            input.value = '';

            // Handle special commands
            if (msg === '!USERS') {
                requestUsers();
                return;
            }

            // Send to server via bridge
            socket.emit('send_message', { message: msg });

            // Show own message locally
            if (msg.startsWith('!DM ')) {
                const parts = msg.split(' ', 3);
                if (parts.length === 3) {
                    appendMessage(`[PRIVATE → ${parts[1]}] ${parts[2]}`, 'self');
                }
            } else if (!msg.startsWith('!')) {
                appendMessage(`[YOU] ${msg}`, 'self');
            }
        }

        // ─── REQUEST USERS ───
        function requestUsers() {
            if (socket) {
                socket.emit('request_users');
            }
        }

        // ─── LEAVE CHAT ───
        function leaveChat() {
            if (socket) {
                socket.emit('leave');
            }
        }

        // ─── PARSE USERS LIST ───
        function parseUsers(msg) {
            const listEl = document.getElementById('users-list');
            listEl.innerHTML = '';
            const lines = msg.split('\n');
            for (const line of lines) {
                const trimmed = line.trim();
                const match = trimmed.match(/^\d+\.\s+(.+)$/);
                if (match) {
                    const name = match[1].trim();
                    const item = document.createElement('div');
                    item.className = 'user-item' + (name === currentUser ? ' is-you' : '');
                    item.innerHTML = `<span class="user-dot"></span>${escapeHtml(name)}${name === currentUser ? ' (you)' : ''}`;

                    // Click to DM
                    if (name !== currentUser) {
                        item.onclick = () => {
                            const input = document.getElementById('msg-input');
                            input.value = `!DM ${name} `;
                            input.focus();
                        };
                    }

                    listEl.appendChild(item);
                }
            }
        }

        // ─── APPEND MESSAGE ───
        function appendMessage(msg, type) {
            const container = document.getElementById('messages-container');

            // Remove welcome section on first message
            const welcome = container.querySelector('.welcome-section');
            if (welcome) welcome.remove();

            const bubble = document.createElement('div');
            bubble.className = `msg-bubble ${type || 'other'}`;

            // Get current time
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', {
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });

            // Detect sender from message pattern like [timestamp] [sender] msg
            let displayMsg = escapeHtml(msg);

            // Style based on type
            if (type === 'self') {
                bubble.innerHTML = `
                    <div style="color: var(--accent);">${displayMsg}</div>
                    <div class="msg-time">${timeStr}</div>
                `;
            } else if (type === 'server') {
                bubble.innerHTML = displayMsg;
            } else if (type === 'private') {
                bubble.innerHTML = `
                    <div style="color: var(--info);">${displayMsg}</div>
                    <div class="msg-time">${timeStr}</div>
                `;
            } else if (type === 'error') {
                bubble.innerHTML = displayMsg;
            } else if (type === 'system') {
                bubble.innerHTML = displayMsg;
            } else if (type === 'history-divider') {
                bubble.innerHTML = displayMsg;
            } else {
                bubble.innerHTML = `
                    <div>${displayMsg}</div>
                    <div class="msg-time">${timeStr}</div>
                `;
            }

            container.appendChild(bubble);

            // Auto-scroll to bottom
            requestAnimationFrame(() => {
                container.scrollTop = container.scrollHeight;
            });
        }

        // ─── ESCAPE HTML ───
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ─── AUTH ENTER KEY ───
        document.addEventListener('DOMContentLoaded', () => {
            const pwField = document.getElementById('auth-password');
            const unField = document.getElementById('auth-username');

            pwField.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') doAuth('login');
            });

            unField.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') document.getElementById('auth-password').focus();
            });

            // Focus username field
            unField.focus();
        });
    </script>
</body>
</html>
